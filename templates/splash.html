<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRC Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --src-green: #006838;
      --src-green-dark: #083c23;
      --src-gold: #d6a329;
      --src-glow: rgba(214, 163, 41, 0.24);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: 'Open Sans', sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, var(--src-glow), transparent 26%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.08), transparent 22%),
        linear-gradient(145deg, var(--src-green-dark), var(--src-green));
    }
    .splash-shell {
      text-align: center;
      padding: 32px;
      animation: fadeIn 0.45s ease;
    }
    .logo-frame {
      width: 170px;
      height: 170px;
      margin: 0 auto 22px;
      border-radius: 38px;
      background: rgba(255,255,255,0.96);
      display: grid;
      place-items: center;
      padding: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.24);
      animation: floatIn 0.9s ease, pulseGlow 2.4s ease-in-out infinite;
    }
    .logo-frame img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .title {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: 0.22em;
    }
    .subtitle {
      margin: 12px 0 22px;
      font-size: 1rem;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .loading-bar {
      width: min(320px, 74vw);
      height: 8px;
      margin: 0 auto;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      overflow: hidden;
    }
    .loading-bar span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #fff, var(--src-gold));
      animation: loadBar 2.2s ease forwards;
    }
    .status {
      margin-top: 14px;
      color: rgba(255,255,255,0.72);
      font-size: 0.95rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes floatIn {
      from { transform: translateY(20px) scale(0.92); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 24px 60px rgba(0,0,0,0.24); }
      50% { box-shadow: 0 26px 64px rgba(214,163,41,0.26); }
    }
    @keyframes loadBar {
      from { width: 0; }
      to { width: 100%; }
    }
  </style>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        window.location.replace("{{ url_for('dashboard') }}");
      }, 2300);
    });
  </script>
</head>
<body>
  <main class="splash-shell">
    <div class="logo-frame">
      <img src="{{ logo_asset }}" alt="SRC logo">
    </div>
    <h1 class="title">SRC</h1>
    <div class="subtitle">Class Representative Portal</div>
    <div class="loading-bar"><span></span></div>
    <div class="status">Starting portal...</div>
  </main>
</body>
</html>
